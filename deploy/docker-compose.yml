name: aegis

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: aegis        # 与 config.py 默认连接串一一对应
      POSTGRES_PASSWORD: aegis    # 仅开发环境；生产走 secrets，不写在文件里
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"               # 左边=宿主机端口(localhost 连的就是它)，右边=容器内端口
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  redis_data: