name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# 最小权限：本 workflow 只需要读代码。GITHUB_TOKEN 默认权限过宽（审计加固 B）
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      # action 钉到完整 commit SHA：tag 可被上游重指恶意提交，SHA 不可变（审计加固 B）
      - name: 检出代码
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true          # 缓存依赖下载，第二次起 CI 明显变快

      - name: 安装依赖（严格按 uv.lock，锁不同步直接失败）
        run: uv sync --frozen

      - name: 代码检查（ruff）
        run: uv run ruff check .

      - name: 类型检查（mypy）
        run: uv run mypy aegis

      - name: 架构分层检查（import-linter）
        run: uv run lint-imports

      - name: 测试（pytest）
        run: uv run pytest